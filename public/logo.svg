<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#0f0a1e"/>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="88" stroke="url(#ringGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Lightning bolt -->
  <path d="M118 28L72 108h36L90 172l58-88h-38L118 28z"
        fill="url(#boltGrad)" filter="url(#glow)"/>

  <!-- Gradients & filters -->
  <defs>
    <linearGradient id="boltGrad" x1="90" y1="28" x2="110" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
